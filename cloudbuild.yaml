steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/streamsync:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/streamsync:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'streamsync'
      - '--image'
      - 'gcr.io/$PROJECT_ID/streamsync:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      # Set the HOST_DOMAIN environment variable used by frontend
      - '--set-env-vars'
      - 'HOST_DOMAIN=streamsync.arayalogic.com'

images:
  - 'gcr.io/$PROJECT_ID/streamsync:$COMMIT_SHA'
