<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamSync - WebRTC Live</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- view: home -->
        <main id="view-home" class="view active">
            <header class="hero-header">
                <h1>StreamSync</h1>
                <p>Peer-to-peer live streaming</p>
            </header>

            <div class="action-buttons">
                <button id="btn-home-camera" class="btn btn-primary btn-large">
                    <span class="icon">📹</span>
                    <span class="text">Host a Camera</span>
                    <span class="subtext">Generate a stream link</span>
                </button>

                <button id="btn-home-monitor" class="btn btn-secondary btn-large">
                    <span class="icon">📺</span>
                    <span class="text">Monitor a Stream</span>
                    <span class="subtext">Join an active stream</span>
                </button>
            </div>
        </main>

        <!-- view: camera setup -->
        <main id="view-camera-setup" class="view hidden">
            <header class="status-header">
                <h2>Waiting for connection...</h2>
                <div class="loader-pulse"></div>
            </header>

            <div class="qr-container">
                <div class="qr-code-wrapper">
                    <div id="qrcode"></div>
                </div>
                <p class="instruction-text">Scan this QR code with the monitor device</p>
            </div>

            <div class="url-share">
                <span id="share-url" class="url-text"></span>
                <button id="btn-copy-url" class="btn btn-sm btn-ghost">Copy Link</button>
            </div>

            <footer>
                <button id="btn-cancel-setup" class="btn btn-danger btn-outline">Cancel</button>
            </footer>
        </main>

        <!-- view: streaming -->
        <main id="view-streaming" class="view hidden">
            <div class="stream-backdrop">
                <div class="live-indicator">
                    <span class="dot"></span> LIVE
                </div>

                <div class="camera-preview">
                    <video id="local-video" autoplay muted playsinline></video>
                </div>
            </div>

            <div class="stream-controls">
                <button id="btn-stop-streaming" class="btn btn-danger btn-pill">
                    <span class="icon">⏹️</span>
                    <span class="text">Stop Streaming</span>
                </button>
            </div>
        </main>

        <!-- view: monitoring (setup) -->
        <main id="view-monitor-setup" class="view hidden">
            <header class="status-header">
                <h2>Enter Stream Code</h2>
                <p>Or scan a QR code from a camera</p>
            </header>

            <div class="input-group">
                <input type="text" id="input-room-id" placeholder="e.g. s9f8s79df87sf9" autocomplete="off">
                <button id="btn-join-room" class="btn btn-primary">Join Stream</button>
            </div>

            <footer>
                <button id="btn-cancel-monitor" class="btn btn-danger btn-outline">Cancel</button>
            </footer>
        </main>

        <!-- view: monitoring (active) -->
        <main id="view-monitoring-active" class="view hidden monitor-full">
            <video id="remote-video" autoplay playsinline></video>

            <div class="overlay-controls">
                <div class="live-badge">LIVE</div>
                <button id="btn-fullscreen" class="btn btn-danger btn-icon" title="Toggle Fullscreen">
                    <span class="icon">
                        <svg class="svg-enter" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor"
                            stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                            </path>
                        </svg>
                        <svg class="svg-exit" style="display:none;" viewBox="0 0 24 24" width="24" height="24"
                            stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path
                                d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3">
                            </path>
                        </svg>
                    </span>
                </button>
                <button id="btn-stop-monitoring" class="btn btn-danger btn-pill">Stop</button>
            </div>
        </main>
    </div>

    <!-- Socket.IO library -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- QRCode library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Main App Script -->
    <script src="js/app.js"></script>
</body>

</html>
